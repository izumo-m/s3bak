# Ephemeral MinIO for s3bak manual testing and the e2e suite.
#
# Usage (from repo root):
#   scripts/compose-up.sh          # start the stack, wait for bucket init
#   source scripts/minio-env.sh    # point aws / s3bak at it
#   uv run s3bak list              # poke at it (S3BAK_CONFIG is set by the env file)
#   scripts/compose.sh down        # tear down (any compose subcommand works)
#
# Console: http://localhost:9001 (minioadmin / minioadmin)
# API:     http://localhost:9000
#
# State lives in tmpfs and disappears on `down`. To persist between runs,
# replace the tmpfs entry with a named volume (e.g. `volumes: [minio-data:/data]`).

# Pinned so compose-up.sh can match the exact container name
# (s3bak-dev-minio-1) rather than any compose stack with a minio service.
name: s3bak-dev

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    tmpfs:
      - /data

  # Creates the buckets the dev workflow expects: s3bak-test for manual play,
  # s3bak-e2e for the e2e suite (which expects it to exist and stay empty
  # between runs).
  mc-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin >/dev/null 2>&1; do sleep 1; done &&
      mc mb --ignore-existing local/s3bak-test &&
      mc mb --ignore-existing local/s3bak-e2e
      "
    restart: "no"
